require:
  - rubocop-powerhome

AllCops:
  TargetRubyVersion: 3.0
  Exclude:
    - 'spec/dummy/db/schema.rb'
    - 'vendor/**/*'           # Add this
    - 'gemfiles/vendor/**/*'   # Add this

Rails:
  Enabled: false

# Relax metrics for Rails engines with domain logic
Metrics/ClassLength:
  Max: 150
  Exclude:
    - 'spec/**/*'
    # SCIM controller implements full CRUD + PATCH operations
    - 'app/controllers/two_percent/scim_controller.rb'

Metrics/ModuleLength:
  Max: 150
  Exclude:
    - 'spec/**/*'

Metrics/MethodLength:
  Max: 15
  Exclude:
    - 'spec/**/*'
    - 'db/migrate/**/*'
    # SCIM controller implements complex RFC 7644 operations (PUT/PATCH)
    - 'app/controllers/two_percent/scim_controller.rb'
    # RFC 7644 PATCH operation parsing requires complex recursive logic
    - 'lib/two_percent/scim/patch_processor.rb'

Metrics/BlockLength:
  Exclude:
    - 'spec/**/*'
    - 'lib/two_percent/syncable.rb'

Metrics/AbcSize:
  Max: 20
  Exclude:
    # SCIM controllers and processors implement complex RFC operations
    - 'app/controllers/two_percent/scim_controller.rb'
    - 'app/models/two_percent/scim_user.rb'
    - 'lib/two_percent/scim/patch_processor.rb'

Metrics/CyclomaticComplexity:
  Exclude:
    # Domain attribute mapping handles multiple strategies
    - 'lib/two_percent/attribute_mapper.rb'
    # RFC 7644 PATCH operation parsing requires conditional branching
    - 'lib/two_percent/scim/patch_processor.rb'

Metrics/PerceivedComplexity:
  Exclude:
    # Domain attribute mapping handles multiple strategies
    - 'lib/two_percent/attribute_mapper.rb'
    # RFC 7644 PATCH operation parsing requires conditional branching
    - 'lib/two_percent/scim/patch_processor.rb'

Layout/LineLength:
  Max: 120
